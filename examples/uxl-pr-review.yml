name: UX review
on: pull_request

permissions:
  contents: read
  pull-requests: write # required for the sticky comment

jobs:
  uxl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: damsleth/ux-loop@v1
        with:
          fail-under: 70
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
