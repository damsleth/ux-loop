<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ux-loop test app</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
        color: #0f172a;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }

      .hero {
        background: white;
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      .cta {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #0f172a;
        color: white;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" data-testid="hero">
        <h1>Reliable fixture page</h1>
        <p>This page exists to keep the capture harness regression-tested.</p>
        <a class="cta" href="#details">Open details</a>
      </section>
    </main>
  </body>
</html>
