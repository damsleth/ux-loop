name: "ux-loop UX review"
description: "Run ux-loop shots + review on a PR and post the UX score as a sticky comment."
author: "damsleth"
branding:
  icon: "eye"
  color: "purple"

inputs:
  working-directory:
    description: "Directory where the target app lives (uxl.config.mjs is resolved here)."
    required: false
    default: "."
  runner:
    description: "Review runner: claude (default), openai, codex, copilot."
    required: false
    default: "claude"
  model:
    description: "Model passed to the runner (--model). Empty = runner default."
    required: false
    default: ""
  fail-under:
    description: "Fail the check when the blended score is below this (1-100). 0 = report-only."
    required: false
    default: "0"
  comment:
    description: "Post/update the sticky PR comment."
    required: false
    default: "true"
  node-version:
    description: "Node.js version (engines requires >= 22)."
    required: false
    default: "22"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Preflight — runner credentials
      shell: bash
      run: |
        case "${{ inputs.runner }}" in
          claude)
            if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
              echo "::error::runner 'claude' requires ANTHROPIC_API_KEY in the job env (secrets.ANTHROPIC_API_KEY)."
              exit 1
            fi ;;
          openai)
            if [ -z "${OPENAI_API_KEY:-}" ]; then
              echo "::error::runner 'openai' requires OPENAI_API_KEY in the job env (secrets.OPENAI_API_KEY)."
              exit 1
            fi ;;
        esac

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm ci

    - name: Install Playwright Chromium
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx playwright install --with-deps chromium

    - name: Capture screenshots
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx uxl shots

    - name: Review (never implement)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        npx uxl review --runner "${{ inputs.runner }}" \
          ${{ inputs.model && format('--model {0}', inputs.model) || '' }}

    - name: Build comment body
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npx uxl report --format github > "${{ runner.temp }}/uxl-comment.md"

    - name: Post sticky PR comment
      if: ${{ always() && inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs')
          const marker = '<!-- uxl-report -->'
          const body = fs.readFileSync(process.env.RUNNER_TEMP + '/uxl-comment.md', 'utf8')
          const { owner, repo } = context.repo
          const issue_number = context.payload.pull_request.number
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number })
          const existing = comments.find((c) => c.body && c.body.includes(marker))
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body })
          }

    - name: Upload artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: uxl-report
        path: |
          ${{ inputs.working-directory }}/.uxl/shots
          ${{ inputs.working-directory }}/.uxl/reports
        if-no-files-found: warn

    - name: Score gate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.fail-under }}" != "0" ]; then
          npx uxl report --fail-under "${{ inputs.fail-under }}" > /dev/null
        fi
